<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="best-practices banner">
  <title>best-practices · read first. write second. verify third.</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#11161d"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#36BCF7"/>
      <stop offset="55%" stop-color="#B084CC"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- subtle dot grid -->
  <g fill="#1a2030" opacity="0.7">
    <circle cx="40"   cy="40"  r="1"/><circle cx="120"  cy="40"  r="1"/><circle cx="200"  cy="40"  r="1"/><circle cx="280"  cy="40"  r="1"/><circle cx="360"  cy="40"  r="1"/><circle cx="440"  cy="40"  r="1"/><circle cx="520"  cy="40"  r="1"/><circle cx="600"  cy="40"  r="1"/><circle cx="680"  cy="40"  r="1"/><circle cx="760"  cy="40"  r="1"/><circle cx="840"  cy="40"  r="1"/><circle cx="920"  cy="40"  r="1"/><circle cx="1000" cy="40"  r="1"/><circle cx="1080" cy="40"  r="1"/><circle cx="1160" cy="40"  r="1"/><circle cx="1240" cy="40"  r="1"/>
    <circle cx="40"   cy="280" r="1"/><circle cx="120"  cy="280" r="1"/><circle cx="200"  cy="280" r="1"/><circle cx="280"  cy="280" r="1"/><circle cx="360"  cy="280" r="1"/><circle cx="440"  cy="280" r="1"/><circle cx="520"  cy="280" r="1"/><circle cx="600"  cy="280" r="1"/><circle cx="680"  cy="280" r="1"/><circle cx="760"  cy="280" r="1"/><circle cx="840"  cy="280" r="1"/><circle cx="920"  cy="280" r="1"/><circle cx="1000" cy="280" r="1"/><circle cx="1080" cy="280" r="1"/><circle cx="1160" cy="280" r="1"/><circle cx="1240" cy="280" r="1"/>
  </g>

  <!-- title -->
  <text x="80" y="148" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="92" font-weight="700" fill="url(#title)">best-practices</text>
  <text x="84" y="194" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" fill="#c9d1d9">read first. write second. verify third.</text>
  <text x="84" y="222" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#7d8590">six cuts · three acts · one kernel · agents and humans, same rigor</text>

  <!-- glyph strip -->
  <g transform="translate(80, 246)" stroke="#36BCF7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- read (eye) -->
    <g transform="translate(0,0)"><path d="M2 16s5-9 14-9 14 9 14 9-5 9-14 9S2 16 2 16z"/><circle cx="16" cy="16" r="4" stroke="#FF6B35"/><circle cx="16" cy="16" r="1.2" fill="#FF6B35" stroke="none"/></g>
    <!-- name (tag) -->
    <g transform="translate(56,0)"><path d="M4 14V6a2 2 0 0 1 2-2h8l14 14-12 12L2 16a2 2 0 0 1 0-2z"/><circle cx="10" cy="10" r="1.6" fill="#FF6B35" stroke="#FF6B35"/></g>
    <!-- small (atom) -->
    <g transform="translate(112,0)"><circle cx="16" cy="16" r="2.2" fill="#FF6B35" stroke="#FF6B35"/><ellipse cx="16" cy="16" rx="13" ry="5"/><ellipse cx="16" cy="16" rx="13" ry="5" transform="rotate(60 16 16)"/><ellipse cx="16" cy="16" rx="13" ry="5" transform="rotate(120 16 16)"/></g>
    <!-- delete (scissors) -->
    <g transform="translate(168,0)"><circle cx="8" cy="22" r="4"/><circle cx="8" cy="10" r="4"/><line x1="11" y1="13" x2="29" y2="6" stroke="#FF6B35"/><line x1="11" y1="19" x2="29" y2="26" stroke="#FF6B35"/><line x1="20" y1="9.5" x2="20" y2="22.5"/></g>
    <!-- evidence (pulse) -->
    <g transform="translate(224,0)"><path d="M2 16h6l3-9 4 18 3-12 3 7 2-4h7"/><circle cx="11" cy="7" r="1.6" fill="#FF6B35" stroke="#FF6B35"/></g>
    <!-- failure (broken link) -->
    <g transform="translate(280,0)"><path d="M14 6l-6 6a4.2 4.2 0 0 0 5.9 5.9l3-3"/><path d="M18 26l6-6a4.2 4.2 0 0 0-5.9-5.9l-3 3"/><path d="M13 18l-3 3" stroke="#FF6B35"/><path d="M19 14l3-3" stroke="#FF6B35"/></g>
  </g>

  <!-- bottom signature -->
  <text x="1196" y="298" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#7d8590" text-anchor="end">github.com/AgriciDaniel/best-practices</text>
</svg>
