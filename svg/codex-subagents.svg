<svg aria-labelledby="cs-title cs-desc" role="img" viewBox="0 0 1e3 480" xmlns="http://www.w3.org/2000/svg"><title id="cs-title">codex subagents: one chair, bounded roles, summarized return</title><desc id="cs-desc">A dark diagram showing a main codex thread delegating bounded work to explorer, worker, and verifier subagents, then receiving summaries for integrated closeout.</desc><rect width="1e3" height="480" fill="#0d1117"/><defs><marker id="cs-arrow" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="9" refY="5" viewBox="0 0 10 10"><path d="m0 0 10 5-10 5z" fill="#FF6B35"/></marker></defs><text x="32" y="36" fill="#7d8590" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">codex subagents: explicit fan-out. bounded work. summarized return.</text><rect x="360" y="64" width="280" height="72" rx="12" fill="none" stroke="#FFD700" stroke-width="2"/><text x="500" y="94" fill="#FFD700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700" text-anchor="middle">main thread</text><text x="500" y="114" fill="#a39055" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" text-anchor="middle">requirements · decisions · integration</text><line x1="500" x2="500" y1="136" y2="164" marker-end="url(#cs-arrow)" stroke="#FF6B35" stroke-width="2"/><rect x="80" y="166" width="840" height="54" rx="12" fill="none" stroke="#36BCF7" stroke-width="1.5"/><text x="500" y="190" fill="#36BCF7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" text-anchor="middle">acceptance bar written before spawn</text><text x="500" y="208" fill="#7aa9c2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" text-anchor="middle">one prompt names the slices, return format, and whether to wait</text><line x1="210" x2="210" y1="220" y2="252" marker-end="url(#cs-arrow)" stroke="#FF6B35" stroke-width="2"/><line x1="500" x2="500" y1="220" y2="252" marker-end="url(#cs-arrow)" stroke="#FF6B35" stroke-width="2"/><line x1="790" x2="790" y1="220" y2="252" marker-end="url(#cs-arrow)" stroke="#FF6B35" stroke-width="2"/><rect x="70" y="256" width="280" height="86" rx="10" fill="none" stroke="#B084CC" stroke-width="1.5"/><text x="210.0" y="284" fill="#B084CC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" text-anchor="middle">explorer</text><text x="210.0" y="308" fill="#7d8590" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" text-anchor="middle">read-only map</text><text x="210.0" y="324" fill="#7d8590" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" text-anchor="middle">call sites · tests · unknowns</text><rect x="360" y="256" width="280" height="86" rx="10" fill="none" stroke="#36BCF7" stroke-width="1.5"/><text x="500.0" y="284" fill="#36BCF7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" text-anchor="middle">worker</text><text x="500.0" y="308" fill="#7d8590" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" text-anchor="middle">single slice</text><text x="500.0" y="324" fill="#7d8590" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" text-anchor="middle">disjoint write scope</text><rect x="650" y="256" width="280" height="86" rx="10" fill="none" stroke="#FF6B35" stroke-width="1.5"/><text x="790.0" y="284" fill="#FF6B35" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" text-anchor="middle">verifier</text><text x="790.0" y="308" fill="#7d8590" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" text-anchor="middle">fresh context</text><text x="790.0" y="324" fill="#7d8590" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" text-anchor="middle">bugs · security · missing tests</text><line x1="210" x2="210" y1="342" y2="374" stroke="#B084CC" stroke-width="1.5"/><line x1="500" x2="500" y1="342" y2="374" stroke="#36BCF7" stroke-width="1.5"/><line x1="790" x2="790" y1="342" y2="374" stroke="#FF6B35" stroke-width="1.5"/><line x1="210" x2="790" y1="374" y2="374" stroke="#7d8590" stroke-width="1.5"/><line x1="500" x2="500" y1="374" y2="398" marker-end="url(#cs-arrow)" stroke="#FF6B35" stroke-width="2"/><rect x="280" y="406" width="440" height="36" rx="10" fill="none" stroke="#FFD700" stroke-width="2"/><text x="500" y="429" fill="#FFD700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" text-anchor="middle">summaries in. claims verified. closeout complete.</text><text x="500" y="456" fill="#7d8590" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" text-anchor="middle">do not fan out by default. ask explicitly. keep the main thread clean.</text></svg>
