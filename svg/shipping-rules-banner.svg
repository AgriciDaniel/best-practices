<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 200" role="img" aria-label="shipping rules banner">
  <title>shipping rules · the agent kernel</title>
  <defs>
    <linearGradient id="srbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#11161d"/>
    </linearGradient>
    <linearGradient id="srtitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="55%" stop-color="#B084CC"/>
      <stop offset="100%" stop-color="#36BCF7"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="200" fill="url(#srbg)"/>

  <g fill="#1a2030" opacity="0.7">
    <circle cx="40"  cy="30"  r="1"/><circle cx="200" cy="30"  r="1"/><circle cx="360" cy="30"  r="1"/><circle cx="520" cy="30"  r="1"/><circle cx="680" cy="30"  r="1"/><circle cx="840" cy="30"  r="1"/><circle cx="1000" cy="30" r="1"/><circle cx="1160" cy="30" r="1"/>
    <circle cx="40"  cy="170" r="1"/><circle cx="200" cy="170" r="1"/><circle cx="360" cy="170" r="1"/><circle cx="520" cy="170" r="1"/><circle cx="680" cy="170" r="1"/><circle cx="840" cy="170" r="1"/><circle cx="1000" cy="170" r="1"/><circle cx="1160" cy="170" r="1"/>
  </g>

  <text x="80" y="100" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="64" font-weight="700" fill="url(#srtitle)">shipping rules</text>
  <text x="84" y="134" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#c9d1d9">the agent kernel</text>
  <text x="84" y="158" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#7d8590">two prompts. one governs the diff. one governs the team. they nest.</text>

  <text x="1196" y="178" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#7d8590" text-anchor="end">github.com/AgriciDaniel/best-practices</text>
